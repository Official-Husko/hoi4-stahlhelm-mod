 helmet_equipment_m45_prototype_short:0 "M45 Prototyp"
 helmet_equipment_m45_prototype_desc:0 "Eine überstürzt eingeführte späte Kriegsschale, am billigsten und am schlechtesten schützend, während die deutsche Kriegswirtschaft zusammenbrach."

 helmet_equipment_gladiator_m38_3pc:0 "Gladiator M38, 3-teilig"
