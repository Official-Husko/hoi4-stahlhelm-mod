 helmet_equipment_m35_desc:0 "Der 1935 eingeführte Standard-Stahlhelm, der die Muster aus dem Ersten Weltkrieg durch eine leichtere, besser schützende Schale ersetzte."
 helmet_equipment_m38:0 "Fallschirmhelm M38"
 helmet_equipment_m38_short:0 "M38"
