 # --- Stahlhelm-Ausrüstung ---
 STH_helmet_equipment:0 "Stahlhelm"
 STH_helmet_equipment_short:0 "Helm"
 STH_helmet_equipment_desc:0 "Stahlhelme für Infanterie zum Kopfschutz."

 STH_helmet_equipment_m16:0 "Stahlhelm M16"
 STH_helmet_equipment_m16_short:0 "M16"
 STH_helmet_equipment_m17:0 "Stahlhelm M17"
 STH_helmet_equipment_m17_short:0 "M17"
 STH_helmet_equipment_m18:0 "Stahlhelm M18"
 STH_helmet_equipment_m18_short:0 "M18"
 STH_helmet_equipment_m18_ventless:0 "Stahlhelm M18 ohne Lüftungsöse"
 STH_helmet_equipment_m18_ventless_short:0 "M18 (ohne Öse)"
 STH_helmet_equipment_m18_ventless_desc:0 "Ein Produktionsfehler: die Lüftungslöcher wurden nicht gestanzt. Weiterhin verwendbar."
 STH_helmet_equipment_m18ec:0 "Stahlhelm M18 (Ohrenausschnitt)"
 STH_helmet_equipment_m18ec_short:0 "M18 OA"
 STH_helmet_equipment_m34:0 "Stahlhelm M34 Zivil"
 STH_helmet_equipment_m34_short:0 "M34"

 STH_helmet_equipment_m35:0 "Stahlhelm M35"
 STH_helmet_equipment_m35_short:0 "M35"
 STH_helmet_equipment_m35_desc:0 "Der 1935 eingeführte Standard-Stahlhelm, der die Muster aus dem Ersten Weltkrieg durch eine leichtere, besser schützende Schale ersetzte."
 STH_helmet_equipment_m37:0 "Fallschirmhelm M37"
 STH_helmet_equipment_m37_short:0 "M37"
 STH_helmet_equipment_m37_desc:0 "Ein frühes, flaches Versuchsmuster für Fallschirmjäger, nie in großer Stückzahl ausgegeben - im Folgejahr durch den überarbeiteten M38 abgelöst."
 STH_helmet_equipment_m38:0 "Fallschirmhelm M38"
 STH_helmet_equipment_m38_short:0 "M38"
 STH_helmet_equipment_m38_desc:0 "Ein flaches Muster ohne Helmrand mit Vierpunkt-Kinnriemen, entwickelt für Fallschirmjäger. Der überarbeitete, in großer Stückzahl ausgegebene Nachfolger des M37-Versuchsmusters."
 STH_helmet_equipment_m40:0 "Stahlhelm M40"
 STH_helmet_equipment_m40_short:0 "M40"
 STH_helmet_equipment_m40_desc:0 "Eine vereinfachte Version des M35 mit einteiliger gestanzter Lüftungsöse zur Erleichterung der Kriegsproduktion."
 STH_helmet_equipment_m42:0 "Stahlhelm M42"
 STH_helmet_equipment_m42_short:0 "M42"
 STH_helmet_equipment_m42_desc:0 "Weiter vereinfachtes Produktionsmuster ohne gerollten Rand, um Material und Bearbeitungszeit zu sparen."
 STH_helmet_equipment_m45_prototype:0 "Stahlhelm M45 Prototyp"
 STH_helmet_equipment_m45_prototype_short:0 "M45 Prototyp"
 STH_helmet_equipment_m45_prototype_desc:0 "Eine überstürzt eingeführte späte Kriegsschale, am billigsten und am schlechtesten schützend, während die deutsche Kriegswirtschaft zusammenbrach."

 STH_helmet_equipment_gladiator_m38_3pc:0 "Gladiator M38, 3-teilig"
 STH_helmet_equipment_gladiator_m38_3pc_short:0 "Gladiator (3-tlg)"
 STH_helmet_equipment_gladiator_m38_3pc_desc:0 "Ziviler Luftschutzhelm für Luftschutzwarte und anderes Heimatfront-Personal, aus 3 gestanzten Teilen gefertigt."
 STH_helmet_equipment_gladiator_m38_2pc:0 "Gladiator M38, 2-teilig"
 STH_helmet_equipment_gladiator_m38_2pc_short:0 "Gladiator (2-tlg)"
 STH_helmet_equipment_gladiator_m38_2pc_desc:0 "Eine vereinfachte 2-teilige Version des Gladiator-Luftschutzhelms, günstiger zu stanzen."
 STH_helmet_equipment_gladiator_m38_1pc:0 "Gladiator M38, 1-teilig (M44)"
 STH_helmet_equipment_gladiator_m38_1pc_short:0 "Gladiator (1-tlg/M44)"
 STH_helmet_equipment_gladiator_m38_1pc_desc:0 "Die letzte, einteilige Vereinfachung des Gladiator-Luftschutzhelms, oft als M44 bezeichnet."

 STH_helmet_equipment_volkssturm:0 "Volkssturm-Stahlhelm-Wiederausgabe"
 STH_helmet_equipment_volkssturm_short:0 "Volkssturm"
 STH_helmet_equipment_volkssturm_desc:0 "Eine Notlösung für den Volkssturm, zusammengestellt aus allem verfügbaren Bestand - alt oder neu, militärisch oder zivil."

 STH_helmet_equipment_m35_beaded:0 "Perlrand-Helm M35"
 STH_helmet_equipment_m35_beaded_short:0 "M35 (Perlrand)"
 STH_helmet_equipment_m35_beaded_desc:0 "Ein Produktionsfehler: ein Perlrand wurde angebracht, wo er nicht sein sollte. Weiterhin verwendbar."
