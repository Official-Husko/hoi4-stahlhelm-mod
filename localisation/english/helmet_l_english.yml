 helmet_equipment_m35:0 "Stahlhelm M35"
 helmet_equipment_m35_short:0 "M35"
 helmet_equipment_m35_desc:0 "The standard German steel helmet adopted in 1935, replacing the WWI-era patterns with a lighter, better-protecting shell."
 helmet_equipment_m38:0 "Fallschirmhelm M38"
 helmet_equipment_m38_short:0 "M38"
 helmet_equipment_m38_desc:0 "A low-profile pattern with the brim removed and a four-point chin strap, developed for paratroopers."
 helmet_equipment_m40:0 "Stahlhelm M40"
 helmet_equipment_m40_short:0 "M40"
 helmet_equipment_m40_desc:0 "A simplified version of the M35 with a one-piece stamped vent fitting, easing wartime production."
 helmet_equipment_m42:0 "Stahlhelm M42"
 helmet_equipment_m42_short:0 "M42"
 helmet_equipment_m42_desc:0 "Further simplified production pattern that drops the rolled edge of earlier helmets to save material and machining time."
 helmet_equipment_m45_prototype:0 "Stahlhelm M45 Prototype"
 helmet_equipment_m45_prototype_short:0 "M45 Prototype"
 helmet_equipment_m45_prototype_desc:0 "A rushed late-war prototype shell, cheapest and worst-protecting of the line as the German war economy collapsed."

 helmet_equipment_gladiator_m38_3pc:0 "Gladiator M38, 3 Piece"
 helmet_equipment_gladiator_m38_3pc_short:0 "Gladiator (3pc)"
 helmet_equipment_gladiator_m38_3pc_desc:0 "Civil air-defense pattern helmet issued to Luftschutz wardens and other home-front personnel, built from 3 stamped pieces."
 helmet_equipment_gladiator_m38_2pc:0 "Gladiator M38, 2 Piece"
 helmet_equipment_gladiator_m38_2pc_short:0 "Gladiator (2pc)"
 helmet_equipment_gladiator_m38_2pc_desc:0 "A simplified 2-piece version of the Gladiator Luftschutz helmet, cheaper to stamp."
 helmet_equipment_gladiator_m38_1pc:0 "Gladiator M38, 1 Piece (M44)"
 helmet_equipment_gladiator_m38_1pc_short:0 "Gladiator (1pc/M44)"
 helmet_equipment_gladiator_m38_1pc_desc:0 "The final, one-piece simplification of the Gladiator Luftschutz helmet, often labeled M44."

 helmet_equipment_m35_beaded:0 "Beaded M35 Helmet"
 helmet_equipment_m35_beaded_short:0 "M35 (Beaded)"
 helmet_equipment_m35_beaded_desc:0 "A production defect: a beaded rolled edge applied where it shouldn't have been. Still serviceable."
